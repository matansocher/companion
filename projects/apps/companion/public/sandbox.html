<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoGuesser Sandbox</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    #street-view {
      width: 100%;
      height: 100%;
    }

    #map-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 250px;
      height: 200px;
      border: 2px solid white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease-in-out;
      z-index: 10;
      overflow: hidden;
      background: #ccc;
    }

    #map-container:hover {
      width: 400px;
      height: 300px;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #guess-button {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: bottom 0.2s;
      z-index: 20;
    }

    #guess-button.active {
      bottom: 10px;
    }

    #score-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    #score-overlay h1 {
      margin: 0 0 10px 0;
      font-size: 2rem;
    }

    #score-overlay p {
      margin: 5px 0;
      font-size: 1.2rem;
    }

    #play-again {
      margin-top: 20px;
      padding: 10px 24px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1.1rem;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="street-view"></div>
  <div id="map-container">
    <div id="map"></div>
    <button id="guess-button">GUESS</button>
  </div>

  <div id="score-overlay">
    <h1>Result</h1>
    <p id="distance-text"></p>
    <p id="score-text"></p>
    <button id="play-again">Play Again</button>
  </div>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC0TDvHBhdk3yADKTJQ8se11lu2Xk7L8Gg&libraries=geometry&callback=initGame"
    async defer></script>
  <script src="/sandbox.js"></script>
</body>

</html>
